services:
  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-8016}:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-8097}:80"
    depends_on:
      - backend
    restart: unless-stopped
